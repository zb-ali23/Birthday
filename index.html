<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Something Special Awaits...</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}

body{
  font-family:'Poppins',sans-serif;
  background:#1a0010;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
  animation:bgShift 12s ease-in-out infinite;
}
@keyframes bgShift{
  0%{background:#1a0010;}
  33%{background:#2d0025;}
  66%{background:#3d0030;}
  100%{background:#1a0010;}
}

#starCanvas{
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
}

.petal{
  position:fixed;pointer-events:none;z-index:1;
  animation:petalFall var(--pd,9s) linear infinite var(--pdel,0s);
  opacity:0;top:-40px;font-size:var(--ps,14px);
}
@keyframes petalFall{
  0%{transform:translateY(0) rotate(0deg) translateX(0px);opacity:0.7;}
  20%{opacity:0.6;}80%{opacity:0.4;}
  100%{transform:translateY(105vh) rotate(500deg) translateX(30px);opacity:0;}
}

.spark{
  position:fixed;pointer-events:none;border-radius:50%;z-index:2;
  animation:sparkFloat var(--sfd,6s) ease-in-out infinite var(--sfdel,0s);
}
@keyframes sparkFloat{
  0%,100%{transform:translateY(0) scale(1);opacity:var(--sop,0.3);}
  50%{transform:translateY(-20px) scale(1.2);opacity:calc(var(--sop,0.3)*1.6);}
}

/* ── CARD ── */
.card{
  position:relative;z-index:10;
  text-align:center;
  padding:2rem 1.6rem 1.8rem;
  display:flex;flex-direction:column;align-items:center;gap:1rem;
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,110,180,0.15);
  border-radius:28px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 20px 80px rgba(180,0,80,0.2),inset 0 0 40px rgba(255,110,180,0.03);
  max-width:380px;width:95%;
}

/* ── LOCK ── */
.lock-icon{
  font-size:3.8rem;line-height:1;
  animation:lockPulse 2.8s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(255,110,180,0.7));
  transition:all 0.6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes lockPulse{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 18px rgba(255,110,180,0.6));}
  50%{transform:scale(1.12);filter:drop-shadow(0 0 36px rgba(255,110,180,1));}
}
.lock-icon.unlocked{animation:unlockAnim 0.7s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes unlockAnim{
  0%{transform:scale(1);}40%{transform:scale(1.4) rotate(-12deg);}
  70%{transform:scale(1.2) rotate(5deg);}100%{transform:scale(1.15) rotate(0deg);}
}

.title{
  font-family:'Dancing Script',cursive;
  font-size:1.85rem;color:#fff;line-height:1.1;
  text-shadow:0 0 30px rgba(255,110,180,0.6);
  animation:titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 20px rgba(255,110,180,0.5);}
  50%{text-shadow:0 0 50px rgba(255,110,180,1),0 0 80px rgba(255,110,180,0.3);}
}
.subtitle{
  font-size:0.68rem;color:rgba(255,255,255,0.38);
  letter-spacing:0.22em;text-transform:uppercase;font-weight:300;
  margin-top:0.5rem;
}

/* ── PIN DISPLAY ── */
.pin-row{
  display:flex;gap:8px;flex-wrap:wrap;
  justify-content:center;margin-top:0.3rem;
  min-height:58px;align-items:center;
}
.pin-box{
  width:52px;height:58px;
  background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(255,110,180,0.25);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.3s,box-shadow 0.3s,background 0.3s;
}
.pin-box.active{
  border-color:#f48fb1;
  box-shadow:0 0 22px rgba(244,143,177,0.5);
  background:rgba(255,110,180,0.08);
}
.pin-box.filled{
  border-color:#e91e8c;
  box-shadow:0 0 18px rgba(233,30,140,0.45);
  background:rgba(233,30,140,0.1);
}
.pin-box.error{
  border-color:#ff5572 !important;
  box-shadow:0 0 18px rgba(255,85,114,0.5) !important;
  background:rgba(255,85,114,0.1) !important;
  animation:shake 0.5s ease forwards;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}15%{transform:translateX(-9px);}
  35%{transform:translateX(9px);}55%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}90%{transform:translateX(-2px);}
}
.pin-box.success{
  border-color:#f48fb1;background:rgba(244,143,177,0.18);
  animation:successPop 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes successPop{
  0%{transform:scale(1);}50%{transform:scale(1.18);}100%{transform:scale(1);}
}
.pin-dot{
  width:12px;height:12px;border-radius:50%;
  background:linear-gradient(135deg,#f48fb1,#e91e8c);
  opacity:0;transform:scale(0);
  transition:opacity 0.2s,transform 0.25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 8px rgba(233,30,140,0.6);
}
.pin-dot.show{opacity:1;transform:scale(1);}

/* ── HINT & ERROR ── */
.hint-text{
  font-size:0.65rem;color:rgba(255,255,255,0.22);
  font-style:italic;letter-spacing:0.04em;
}
.hint-text span{color:rgba(244,143,177,0.6);}
.error-msg{
  font-size:0.67rem;color:#ff8fb1;
  opacity:0;transition:opacity 0.3s;
  letter-spacing:0.06em;min-height:1rem;
}
.error-msg.show{opacity:1;}

/* ── ALPHABET KEYBOARD ── */
.keyboard{
  display:flex;flex-direction:column;gap:6px;
  margin-top:0.4rem;width:100%;
}
.kb-row{
  display:flex;gap:5px;justify-content:center;
}
.key{
  min-width:30px;height:42px;flex:1;max-width:36px;
  background:rgba(255,255,255,0.07);
  border:0.5px solid rgba(255,110,180,0.2);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Poppins',sans-serif;
  font-size:0.78rem;font-weight:500;
  color:rgba(255,255,255,0.85);
  cursor:pointer;user-select:none;
  transition:background 0.15s,transform 0.1s,box-shadow 0.15s;
  -webkit-tap-highlight-color:transparent;
  letter-spacing:0.02em;
}
.key:hover{
  background:rgba(244,143,177,0.18);
  box-shadow:0 0 14px rgba(244,143,177,0.25);
  border-color:rgba(244,143,177,0.4);
}
.key:active{transform:scale(0.88);background:rgba(233,30,140,0.2);}
.key.del{
  min-width:44px;max-width:52px;
  color:#f48fb1;font-size:0.9rem;
  background:rgba(244,143,177,0.08);
  border-color:rgba(244,143,177,0.25);
}
.key.space-key{
  min-width:80px;max-width:100px;
  font-size:0.6rem;letter-spacing:0.15em;
  text-transform:uppercase;color:rgba(255,255,255,0.4);
}

/* ── PAGE TRANSITION ── */
.page-fade{
  position:fixed;inset:0;background:#1a0010;
  z-index:100;opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
.page-fade.out{opacity:1;pointer-events:all;}

/* ── SUCCESS SCREEN ── */
.success-screen{
  display:none;flex-direction:column;
  align-items:center;gap:1.2rem;
  animation:fadeInUp 0.6s ease forwards;
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="page-fade" id="pageFade"></div>

<div class="card" id="mainCard">

  <!-- MAIN INPUT UI -->
  <div id="cardInner">
    <div class="lock-icon" id="lockIcon">🔒</div>
    <div class="title">This is just for you...</div>
    <div class="subtitle">enter her nickname to unlock 💕</div>

    <div class="pin-row" id="pinRow"></div>

    <div class="error-msg" id="errMsg">✗ &nbsp;That's not right, try again...</div>
    <div class="hint-text">hint: <span>your nickname 🌸</span></div>

    <!-- KEYBOARD -->
    <div class="keyboard">
      <div class="kb-row" id="row1"></div>
      <div class="kb-row" id="row2"></div>
      <div class="kb-row" id="row3"></div>
    </div>
  </div>

  <!-- SUCCESS SCREEN -->
  <div class="success-screen" id="successScreen">
    <div style="font-size:4rem;filter:drop-shadow(0 0 30px rgba(255,110,180,0.9));">🔓</div>
    <div style="font-family:'Dancing Script',cursive;font-size:2rem;color:#fff;text-shadow:0 0 30px rgba(255,110,180,0.8);line-height:1.4;">
      She knew the secret 🌸
    </div>
    <div style="font-size:0.7rem;color:rgba(255,255,255,0.4);letter-spacing:0.18em;text-transform:uppercase;">opening your surprise...</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script>
// ── STAR CANVAS ──
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
const stars = Array.from({length:150},()=>({
  x:Math.random()*canvas.width, y:Math.random()*canvas.height,
  r:Math.random()*1.6+0.2, b:Math.random(),
  sp:Math.random()*0.012+0.004, dir:Math.random()>0.5?1:-1
}));
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.b+=s.sp*s.dir;
    if(s.b>1||s.b<0)s.dir*=-1;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,180,220,${s.b*0.85})`;ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ── PETALS ──
const petalEmojis=['🌸','🌺','✿','🌷','❀'];
for(let i=0;i<22;i++){
  const p=document.createElement('div');p.className='petal';
  p.textContent=petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  p.style.left=Math.random()*100+'%';
  p.style.setProperty('--ps',(9+Math.random()*10)+'px');
  p.style.setProperty('--pd',(7+Math.random()*9)+'s');
  p.style.setProperty('--pdel',(Math.random()*12)+'s');
  document.body.appendChild(p);
}

// ── SPARKS ──
for(let i=0;i<14;i++){
  const s=document.createElement('div');s.className='spark';
  const size=3+Math.random()*4;
  s.style.cssText=`width:${size}px;height:${size}px;background:rgba(255,${100+Math.floor(Math.random()*80)},180,0.4);left:${Math.random()*100}%;top:${Math.random()*100}%;--sfd:${4+Math.random()*5}s;--sfdel:${Math.random()*6}s;--sop:${0.2+Math.random()*0.3};`;
  document.body.appendChild(s);
}

// ── KEYBOARD BUILD ──
const rows = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Z','X','C','V','B','N','M','⌫']
];
rows.forEach((letters, ri) => {
  const rowEl = document.getElementById('row'+(ri+1));
  letters.forEach(l => {
    const k = document.createElement('div');
    k.className = 'key' + (l==='⌫' ? ' del' : '');
    k.textContent = l;
    k.addEventListener('click', () => l==='⌫' ? delKey() : pressKey(l.toLowerCase()));
    rowEl.appendChild(k);
  });
});

// ── PIN LOGIC ──
// !! CHANGE THIS to the nickname !!
const CORRECT = 'zaru';
let entered = '';
let locked = false;

// Build PIN boxes based on nickname length
function buildBoxes(){
  const row = document.getElementById('pinRow');
  row.innerHTML = '';
  for(let i=0;i<CORRECT.length;i++){
    const box = document.createElement('div');
    box.className = 'pin-box' + (i===0?' active':'');
    box.id = 'pb'+i;
    const dot = document.createElement('div');
    dot.className = 'pin-dot';dot.id='pd'+i;
    box.appendChild(dot);row.appendChild(box);
  }
}
buildBoxes();

function pressKey(k){
  if(locked||entered.length>=CORRECT.length)return;
  entered+=k;
  updateBoxes();
  if(entered.length===CORRECT.length)setTimeout(validate,200);
}

function delKey(){
  if(locked)return;
  entered=entered.slice(0,-1);
  updateBoxes();
  document.getElementById('errMsg').classList.remove('show');
}

function updateBoxes(){
  for(let i=0;i<CORRECT.length;i++){
    const box=document.getElementById('pb'+i);
    const dot=document.getElementById('pd'+i);
    if(!box)continue;
    box.classList.remove('active','filled','error','success');
    dot.classList.remove('show');
    if(i<entered.length){box.classList.add('filled');dot.classList.add('show');}
    else if(i===entered.length){box.classList.add('active');}
  }
}

function validate(){
  if(entered===CORRECT){
    locked=true;
    for(let i=0;i<CORRECT.length;i++){
      setTimeout(()=>{
        const b=document.getElementById('pb'+i);
        if(b){b.classList.remove('filled','active');b.classList.add('success');}
      },i*80);
    }
    setTimeout(()=>{
      document.getElementById('lockIcon').textContent='🔓';
      document.getElementById('lockIcon').classList.add('unlocked');
    },350);
    setTimeout(()=>{
      confetti({particleCount:200,spread:110,origin:{y:0.55},colors:['#f48fb1','#e91e8c','#fff','#f8bbd0','#c2185b','#fce4ec']});
    },500);
    setTimeout(()=>{
      confetti({particleCount:120,angle:60,spread:80,origin:{x:0,y:0.6},colors:['#f48fb1','#e91e8c','#fff']});
      confetti({particleCount:120,angle:120,spread:80,origin:{x:1,y:0.6},colors:['#f48fb1','#e91e8c','#fff']});
    },800);
    setTimeout(()=>{
      document.getElementById('cardInner').style.display='none';
      document.getElementById('successScreen').style.display='flex';
      if (typeof window.startGlobalMusic === 'function') {
        window.startGlobalMusic();
      }
    },1400);
    setTimeout(()=>{
      document.getElementById('pageFade').classList.add('out');
      setTimeout(()=>{ window.location.href='page2.html'; },300);
    },2800);
  } else {
    for(let i=0;i<CORRECT.length;i++){
      const b=document.getElementById('pb'+i);if(b)b.classList.add('error');
    }
    document.getElementById('errMsg').classList.add('show');
    setTimeout(()=>{
      entered='';updateBoxes();
      for(let i=0;i<CORRECT.length;i++){
        const b=document.getElementById('pb'+i);if(b)b.classList.remove('error');
      }
    },750);
  }
}

// Physical keyboard support
document.addEventListener('keydown',e=>{
  if(e.key.length===1&&e.key.match(/[a-z]/i))pressKey(e.key.toLowerCase());
  else if(e.key==='Backspace')delKey();
});

// Fade in on load
window.addEventListener('load',()=>{
  const fade=document.getElementById('pageFade');
  fade.style.transition='none';fade.style.opacity='1';fade.style.pointerEvents='all';
  requestAnimationFrame(()=>{
    fade.style.transition='opacity 0.7s ease';
    requestAnimationFrame(()=>{fade.style.opacity='0';fade.style.pointerEvents='none';});
  });
});
</script>
<script src="music.js"></script>
</body>
</html>
